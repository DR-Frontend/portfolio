<!DOCTYPE html>
<html lang="es-MX">
<head>
   <meta charset="UTF-8">
   <meta http-equiv="X-UA-Compatible" content="IE=edge">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>Javascript</title>
   <link rel="stylesheet" href="../css/global.css">
   <link rel="stylesheet" href="../css/javascript.css">
   <link rel="stylesheet" href="../css/animations.css">
   <link rel="stylesheet" href="../libs/dr-font/style.css">
   <script defer src="../js/ejercicios.js"></script>
</head>

<body>
   
   <a href="#" class="home-btn">
      <h2>&gt&gt</h2>
   </a>

   <section id="menu" class="menu">
      <a href="https://dr-frontend.github.io/portfolio">
         <img src="../assets/svg/logo_html.svg" alt="">
         <img src="../assets/svg/logo_css.svg" alt="">
         <img src="../assets/svg/logo_js.svg" alt="">
      </a>
   </section>

   <section id="js" class="js">
      <h2>JAVASCRIPT</h2><br>

      <div class="js__wrapp">
         <details class="js__details bold">
            <summary> <i class="icon-function"></i> Operaciones Aritméticas</summary><br>
            <div class="js_operaciones">
               <p>Suma, resta, multiplicación o división de 2 números.</p>
               <input type="number" id="operadorA" placeholder="Número 1" class="bold"><span id="operacion"></span>
               <input type="number" id="operadorB" placeholder="Número 2" class="bold"><br>
               <button onclick="sumar()" class="bold-btn">Sumar</button>
               <button onclick="restar()" class="bold-btn">Restar</button>
               <button onclick="multiplicar()" class="bold-btn">Multiplicar</button>
               <button onclick="dividir()" class="bold-btn">Dividir</button>
               <p id="resultado"></p>
            </div>
         </details>

         <details class="js__details bold">
            <summary><i class="icon-function"></i> Número mayor</summary><br>
            <div class="js__mayorQue">
               <p>Comparar 2 números y determinar cuál es mayor.</p>
               <input type="number" id="numero1" placeholder="Primer número" class="bold">
               <input type="number" id="numero2" placeholder="Segundo número" class="bold"><br>
               <button onclick="comprobar()" class="bold-btn">Comprobar números</button>
               <p id="respuesta"></p>
            </div>
         </details>

         <details class="js__details bold">
            <summary><i class="icon-function"></i> Calificación</summary><br>
            <div class="js__calificacion">
               <p>En un rango de 0 a 10 escribe una 'calificación' para mostrar el desempeño.</p>
               <input type="number" id="valor" placeholder="Calificación" class="bold"><br>
               <button onclick="calificar()" class="bold-btn">Calificar</button>
               <p id="calificacion"></p>
            </div>
         </details>
      </div>
   </section>

</body>
</html>
